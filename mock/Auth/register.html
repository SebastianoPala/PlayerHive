<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>playerHive | Register</title>
    <style>
        /* =========================================
           STYLE VARIABLES - "CONSOLE GLASS" VIBE
           ========================================= */
        :root {
            --bg-gradient: radial-gradient(circle at top right, #2a0845, #1a1a24, #0b0c10); 
            --glass-bg: rgba(20, 22, 28, 0.4);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            
            --accent-glow: #e0f2fe; 
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --font-main: 'system-ui', -apple-system, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-main);
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-primary);
            display: flex;
            height: 100vh;
            padding: 20px;
            overflow: hidden;
        }

        .app-wrapper {
            width: 100%;
            max-width: 1800px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* =========================================
           FLOATING GLASS HEADER
           ========================================= */
        header.glass-nav {
            height: 80px;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: var(--glass-shadow);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            flex-shrink: 0;
        }

        .logo {
            font-size: 1.6rem;
            font-weight: 300;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
        }

        .logo b {
            font-weight: 700;
        }

        .logo::after {
            content: "";
            display: inline-block;
            width: 8px;
            height: 8px;
            background-color: var(--accent-glow);
            border-radius: 50%;
            margin-left: 8px;
            box-shadow: 0 0 10px var(--accent-glow);
        }

        /* =========================================
           REGISTRATION AREA
           ========================================= */
        .register-layout {
            display: flex;
            justify-content: center;
            align-items: center;
            flex: 1;
            height: calc(100vh - 140px);
        }

        .glass-register-panel {
            width: 100%;
            max-width: 460px;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: var(--glass-shadow);
            padding: 35px 40px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            max-height: calc(100vh - 160px);
            overflow-y: auto;
        }

        /* Custom Scrollbar for the panel if screen is small */
        .glass-register-panel::-webkit-scrollbar {
            width: 6px;
        }
        .glass-register-panel::-webkit-scrollbar-track {
            background: transparent;
        }
        .glass-register-panel::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        .register-header {
            text-align: center;
        }

        .register-header h1 {
            font-size: 1.8rem;
            margin-bottom: 6px;
            letter-spacing: 1px;
        }

        .register-header p {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        /* Form Styles */
        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-group label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-left: 4px;
        }

        .form-control {
            width: 100%;
            padding: 12px 16px;
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.2);
        }

        .form-control:focus {
            border-color: var(--accent-glow);
            box-shadow: 0 0 8px rgba(224, 242, 254, 0.15);
            background: rgba(0, 0, 0, 0.4);
        }

        /* Specific style for calendar icon picker color adjustment if needed */
        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
            opacity: 0.5;
            cursor: pointer;
        }
        input[type="date"]::-webkit-calendar-picker-indicator:hover {
            opacity: 0.8;
        }

        /* Buttons */
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .btn-primary {
            background: var(--text-primary);
            color: #000;
            margin-top: 5px;
        }

        .btn-primary:hover {
            background: var(--accent-glow);
            box-shadow: 0 0 15px rgba(224, 242, 254, 0.3);
            transform: translateY(-1px);
        }

        .auth-divider {
            display: flex;
            align-items: center;
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.85rem;
            margin: 5px 0;
        }

        .auth-divider::before,
        .auth-divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--glass-border);
        }

        .auth-divider::before { margin-right: 15px; }
        .auth-divider::after { margin-left: 15px; }

        .btn-secondary {
            background: transparent;
            color: var(--text-primary);
            border: 1px solid var(--glass-border);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.2);
        }

    </style>
</head>
<body>

    <div class="app-wrapper">
        
        <header class="glass-nav">
            <div class="logo">player<b>Hive</b></div>
        </header>

        <div class="register-layout">
            
            <main class="glass-register-panel">
                <div class="register-header">
                    <h1>Create Account</h1>
                    <p>Join the hive and start your journey</p>
                </div>

                <form id="registerForm" class="auth-form">
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" class="form-control" placeholder="PlayerOne" required>
                    </div>

                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" class="form-control" placeholder="player@hive.com" required>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                    </div>

                    <div class="form-group">
                        <label for="birthDate">Birth Date</label>
                        <input type="date" id="birthDate" class="form-control" required>
                    </div>

                    <button type="submit" class="btn btn-primary">Sign Up</button>
                </form>

                <div class="auth-divider">OR</div>

                <button type="button" class="btn btn-secondary" onclick="window.location.href='login.html'">
                    Already have an account? Log In
                </button>
            </main>

        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault(); // Prevent page reload

            // Build the requested JSON structure
            const registrationData = {
                username: document.getElementById('username').value,
                password: document.getElementById('password').value,
                email: document.getElementById('email').value,
                birthDate: document.getElementById('birthDate').value
            };

            // Log output to console (ready to be sent to your signup API endpoint)
            console.log("Registration JSON Payload:", JSON.stringify(registrationData, null, 2));

            // Setup your fetch request here:
            /*
            fetch('YOUR_REGISTRATION_API_ENDPOINT', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(registrationData)
            }).then(response => ...)
            */
        });
    </script>

</body>
</html>
