<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>playerHive | Token Manager</title>
    <style>
        /* =========================================
           STYLE VARIABLES - "CONSOLE GLASS" VIBE
           ========================================= */
        :root {
            --bg-gradient: radial-gradient(circle at top right, #2a0845, #1a1a24, #0b0c10); 
            --glass-bg: rgba(20, 22, 28, 0.4);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            
            --accent-glow: #e0f2fe; 
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --font-main: 'system-ui', -apple-system, sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-main);
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-primary);
            display: flex;
            height: 100vh;
            padding: 20px;
            overflow: hidden;
            justify-content: center;
            align-items: center;
        }

        .logo { font-size: 2rem; font-weight: 300; letter-spacing: 2px; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; }
        .logo b { font-weight: 700; }
        .logo::after { content: ""; width: 10px; height: 10px; background: var(--accent-glow); border-radius: 50%; margin-left: 8px; box-shadow: 0 0 12px var(--accent-glow); }

        /* Auth Container */
        .auth-container {
            width: 100%;
            max-width: 400px;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: var(--glass-shadow);
            padding: 40px;
            display: flex;
            flex-direction: column;
            text-align: center;
        }

        .auth-container h2 {
            font-size: 1.4rem;
            margin-bottom: 15px;
            color: var(--text-primary);
        }

        /* Token State Indicator */
        .token-badge {
            font-size: 0.8rem;
            font-weight: bold;
            padding: 8px 12px;
            border-radius: 16px;
            margin-bottom: 25px;
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            align-self: center;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            gap: 5px;
        }
        .token-active {
            background: rgba(76, 175, 80, 0.1);
            color: #4caf50;
            border: 1px solid rgba(76, 175, 80, 0.3);
        }
        .token-missing {
            background: rgba(255, 152, 0, 0.1);
            color: #ff9800;
            border: 1px solid rgba(255, 152, 0, 0.3);
        }
        .logged-user-id {
            color: var(--text-primary);
            font-size: 0.7rem;
            background: rgba(0,0,0,0.2);
            padding: 4px 8px;
            border-radius: 8px;
            text-transform: none;
            letter-spacing: 0;
            word-break: break-all;
        }

        .auth-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: var(--text-primary);
            padding: 15px 20px;
            border-radius: 12px;
            outline: none;
            margin-bottom: 15px;
            font-size: 1rem;
            transition: 0.3s;
        }
        .auth-input:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--accent-glow);
            box-shadow: 0 0 10px rgba(224, 242, 254, 0.1);
        }

        .auth-btn {
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--glass-border);
            color: var(--text-primary);
            padding: 15px 20px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            transition: 0.3s;
            margin-top: 5px;
        }
        .auth-btn:hover { background: rgba(255, 255, 255, 0.2); }
        .auth-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .logout-btn {
            background: rgba(255, 107, 107, 0.1);
            border-color: rgba(255, 107, 107, 0.3);
            color: #ff6b6b;
            margin-top: 15px;
        }
        .logout-btn:hover {
            background: rgba(255, 107, 107, 0.2);
            border-color: rgba(255, 107, 107, 0.5);
        }

        .status-msg { margin-top: 15px; font-size: 0.9rem; min-height: 20px; }
        .error { color: #ff6b6b; }
        .success { color: #4caf50; }

        .nav-back { margin-top: 25px; font-size: 0.9rem; color: var(--text-secondary); text-decoration: none; transition: 0.2s; }
        .nav-back:hover { color: var(--accent-glow); }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="logo">player<b>Hive</b></div>
        
        <h2>Token Manager</h2>
        
        <div id="tokenBadge" class="token-badge token-missing">Checking...</div>

        <input type="text" id="usernameInput" class="auth-input" placeholder="Enter Username...">
        
        <button id="loginBtn" class="auth-btn" onclick="attemptLogin()">Login (Get Token)</button>
        <button id="logoutBtn" class="auth-btn logout-btn" onclick="attemptLogout()">Logout (Drop Token)</button>
        
        <div id="loginStatus" class="status-msg"></div>

        <a href="usersearch.html" class="nav-back">← Back to App</a>
    </div>

    <script>
        const tokenBadge = document.getElementById('tokenBadge');
        const usernameInput = document.getElementById('usernameInput');
        const loginBtn = document.getElementById('loginBtn');
        const loginStatus = document.getElementById('loginStatus');

        // Funzione per decodificare il JWT ed estrarre il payload
        function parseJwt(token) {
            try {
                const base64Url = token.split('.')[1];
                const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                const jsonPayload = decodeURIComponent(window.atob(base64).split('').map(function(c) {
                    return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                }).join(''));
                return JSON.parse(jsonPayload);
            } catch (error) {
                console.error("Token errato o non decodificabile", error);
                return null;
            }
        }

        // Aggiorna visivamente lo stato del token memorizzato
        function updateTokenStatusIndicator() {
            const token = localStorage.getItem('accessToken');
            if (token) {
                const decodedData = parseJwt(token);
                // Il tuo backend inserisce l'ID utente nel campo 'sub'
                const loggedInUserId = decodedData ? decodedData.sub : 'Unknown ID';
                
                tokenBadge.innerHTML = `
                    Token Stored
                    <span class="logged-user-id">ID: ${loggedInUserId}</span>
                `;
                tokenBadge.className = "token-badge token-active";
            } else {
                tokenBadge.innerHTML = "No Token Detected";
                tokenBadge.className = "token-badge token-missing";
            }
        }

        // Funzione per inviare il payload ed effettuare il Login
        async function attemptLogin() {
            const targetUsername = usernameInput.value.trim();

            if (!targetUsername) {
                loginStatus.className = 'status-msg error';
                loginStatus.innerText = 'Please enter a username.';
                return;
            }

            // Costruiamo dinamicamente il payload richiesto
            const generatedEmail = `${targetUsername}@hotmail.com`;
            const generatedPassword = targetUsername;

            loginBtn.disabled = true;
            loginStatus.className = 'status-msg';
            loginStatus.innerText = `Requesting token as ${targetUsername}...`;

            try {
                const response = await fetch('http://localhost:8080/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: generatedEmail, password: generatedPassword })
                });

                if (!response.ok) {
                    throw new Error('Invalid credentials or server offline.');
                }

                const data = await response.json();
                
                if (data.accessToken) {
                    localStorage.setItem('accessToken', data.accessToken);
                    loginStatus.className = 'status-msg success';
                    loginStatus.innerText = 'Token fetched and saved successfully!';
                    usernameInput.value = '';
                } else {
                    throw new Error('Response missing accessToken field.');
                }

            } catch (err) {
                loginStatus.className = 'status-msg error';
                loginStatus.innerText = err.message;
            } finally {
                loginBtn.disabled = false;
                updateTokenStatusIndicator();
            }
        }

        // Funzione per il Logout (Svuota il localStorage)
        function attemptLogout() {
            localStorage.removeItem('accessToken');
            loginStatus.className = 'status-msg success';
            loginStatus.innerText = 'Token dropped from local storage.';
            updateTokenStatusIndicator(); 
        }

        // Gestione pressione del tasto Invio
        usernameInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') attemptLogin();
        });

        // Controllo iniziale al caricamento della pagina
        updateTokenStatusIndicator();
    </script>
</body>
</html>
