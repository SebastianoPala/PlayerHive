<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>playerHive | Template</title>
    <style>
        /* =========================================
           STYLE VARIABLES - "PLAYERHIVE" VIBE
           ========================================= */
        :root {
            --bg-base: #0f1115;       
            --bg-panel: #1a1e24;      
            --bg-hover: #232830;      
            --accent-main: #f5a623;   
            --accent-glow: rgba(245, 166, 35, 0.3);
            --text-light: #e2e8f0;    
            --text-muted: #8b949e;    
            --font-main: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-main);
            background-color: var(--bg-base);
            color: var(--text-light);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* =========================================
           HEADER & LOGO
           ========================================= */
        header {
            background-color: var(--bg-panel);
            height: 70px;
            display: flex;
            align-items: center;
            padding: 0 30px;
            border-bottom: 2px solid var(--accent-main);
            box-shadow: 0 4px 15px var(--accent-glow);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: 1px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .logo span {
            color: var(--accent-main);
        }

        .logo::before {
            content: "⬡";
            color: var(--accent-main);
            font-size: 2.2rem;
            line-height: 0;
        }

        nav.top-nav {
            margin-left: 40px;
            display: flex;
            gap: 25px;
        }

        nav.top-nav a {
            color: var(--text-light);
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1rem;
            transition: color 0.2s;
        }

        nav.top-nav a:hover, nav.top-nav a.active {
            color: var(--accent-main);
        }

        .user-menu {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .avatar-placeholder {
            width: 40px;
            height: 40px;
            background-color: var(--bg-hover);
            border: 2px solid var(--accent-main);
            border-radius: 5px; 
            cursor: pointer;
        }

        /* =========================================
           MAIN LAYOUT
           ========================================= */
        .app-container {
            display: flex;
            flex: 1;
            padding: 20px 30px;
            gap: 20px;
            max-width: 1600px;
            margin: 0 auto;
            width: 100%;
        }

        /* SIDEBAR */
        aside.sidebar {
            width: 250px;
            background-color: transparent; /* Ready for content styling */
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* MAIN CONTENT AREA */
        main.content-area {
            flex: 1;
            background-color: transparent; /* Ready for content styling */
            display: flex;
            flex-direction: column;
        }

    </style>
</head>
<body>

    <!-- TOP NAVIGATION -->
    <header>
        <div class="logo">player<span>Hive</span></div>
        <nav class="top-nav">
            <!-- Add your navigation links here -->
        </nav>
        <div class="user-menu">
            <!-- Add user wallet, notifications, or profile drop-down here -->
            <div class="avatar-placeholder"></div>
        </div>
    </header>

    <!-- APP CONTAINER -->
    <div class="app-container">
        
        <!-- SIDEBAR -->
        <aside class="sidebar">
            <!-- Add sidebar content here (e.g., friends list, filters) -->
        </aside>

        <!-- MAIN CONTENT AREA -->
        <main class="content-area">
            <!-- Add main content here (e.g., game grid, reviews, store page) -->
        </main>

    </div>

</body>
</html>
