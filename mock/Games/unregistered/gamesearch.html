<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>playerHive | Game Search</title>
    <style>
        :root {
            --bg-gradient: radial-gradient(circle at top right, #2a0845, #1a1a24, #0b0c10); 
            --glass-bg: rgba(20, 22, 28, 0.4);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            --accent-glow: #e0f2fe;
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --font-main: 'system-ui', -apple-system, sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: var(--font-main);
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-primary);
            display: flex;
            height: 100vh;
            padding: 20px;
            overflow: hidden;
        }

        .app-wrapper { width: 100%; display: flex; flex-direction: column; gap: 20px; }

        /* HEADER: Search and Controls centered */
        header.glass-nav {
            height: 80px;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            display: grid;
            grid-template-columns: 1fr 3fr 1fr;
            align-items: center;
            padding: 0 40px;
            flex-shrink: 0;
        }

        .logo { font-size: 1.6rem; font-weight: 300; letter-spacing: 2px; display: flex; align-items: center; }
        .logo b { font-weight: 700; }
        .logo::after { content: ""; width: 8px; height: 8px; background: var(--accent-glow); border-radius: 50%; margin-left: 8px; box-shadow: 0 0 10px var(--accent-glow); }

        .search-controls { display: flex; justify-content: center; align-items: center; gap: 10px; }
        .search-input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: var(--text-primary);
            padding: 10px 20px;
            border-radius: 20px;
            outline: none;
            width: 250px;
            transition: 0.3s;
        }
        .control-group { display: flex; align-items: center; gap: 5px; font-size: 0.8rem; color: var(--text-secondary); }
        .num-input {
            width: 60px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 5px;
            border-radius: 8px;
            outline: none;
        }

        .user-actions { display: flex; justify-content: flex-end; }
        .login-btn {
            background: transparent;
            border: 1px solid var(--glass-border);
            color: var(--text-primary);
            padding: 10px 30px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
        }

        /* MAIN: FULL WIDTH (No sidebar) */
        main.glass-content {
            flex: 1;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 30px;
            overflow-y: auto;
        }

        /* MATRIX GRID */
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 25px;
            width: 100%;
        }

        .game-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
        }
        .game-card:hover { transform: translateY(-5px); background: rgba(255, 255, 255, 0.07); }
        .game-card img { width: 100%; height: 140px; object-fit: cover; }
        
        .game-info { padding: 15px; flex-grow: 1; display: flex; flex-direction: column; gap: 10px; }
        .game-info h3 { font-size: 1rem; line-height: 1.2; height: 2.4em; overflow: hidden; }
        
        .price-details { display: flex; flex-direction: column; gap: 4px; }
        .old-price { font-size: 0.85rem; color: var(--text-secondary); text-decoration: line-through; }
        .price-row { display: flex; align-items: center; gap: 10px; }
        .discount-tag { background: #4caf50; color: #000; padding: 2px 6px; border-radius: 4px; font-size: 0.8rem; font-weight: bold; }
        .final-price { font-size: 1.2rem; font-weight: bold; color: var(--accent-glow); }

        .pagination-bar { display: flex; justify-content: center; gap: 20px; margin-top: 40px; align-items: center; }
        .nav-btn { background: rgba(255,255,255,0.1); border: none; color: white; padding: 10px 20px; border-radius: 10px; cursor: pointer; }
        .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>
<body>

    <div class="app-wrapper">
        <header class="glass-nav">
            <div class="logo">player<b>Hive</b></div>
            <div class="search-controls">
                <input type="text" id="searchInput" class="search-input" placeholder="Search games...">
                <div class="control-group">
                    <label>Page:</label>
                    <input type="number" id="pageInput" class="num-input" value="0" min="0">
                </div>
                <div class="control-group">
                    <label>Size:</label>
                    <input type="number" id="sizeInput" class="num-input" value="15" min="15">
                </div>
            </div>
            <div class="user-actions">
                <button class="login-btn">Login</button>
            </div>
        </header>

        <main class="glass-content">
            <div id="gamesGrid" class="games-grid">
                <p style="grid-column: 1/-1; text-align: center; color: var(--text-secondary); margin-top: 100px;">
                    Enter a game title and press Enter to search.
                </p>
            </div>
            
            <div class="pagination-bar" id="paginationControls" style="display: none;">
                <button id="prevBtn" class="nav-btn">Previous Page</button>
                <span id="pageDisplay">Page 0</span>
                <button id="nextBtn" class="nav-btn">Next Page</button>
            </div>
        </main>
    </div>

    <script>
        const gamesGrid = document.getElementById('gamesGrid');
        const searchInput = document.getElementById('searchInput');
        const pageInput = document.getElementById('pageInput');
        const sizeInput = document.getElementById('sizeInput');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const pageDisplay = document.getElementById('pageDisplay');

        let currentQuery = '';

        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                currentQuery = searchInput.value.trim();
                if (currentQuery) fetchGames();
            }
        });

        // Re-fetch when page or size changes manually
        [pageInput, sizeInput].forEach(input => {
            input.addEventListener('change', () => { if(currentQuery) fetchGames(); });
        });

        async function fetchGames() {
            const page = pageInput.value;
            const size = sizeInput.value;
            gamesGrid.innerHTML = '<p style="grid-column: 1/-1; text-align: center;">Searching database...</p>';
            
            try {
                const response = await fetch(`http://localhost:8080/api/games/search/${encodeURIComponent(currentQuery)}?page=${page}&size=${size}`);
                const data = await response.json();
                
                renderGrid(data.searchResult);
                
                document.getElementById('paginationControls').style.display = 'flex';
                pageDisplay.innerText = `Page ${page}`;
                prevBtn.disabled = (page <= 0);
                nextBtn.disabled = data.lastPage;
            } catch (err) {
                gamesGrid.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: #ff6b6b;">Error: API Offline (localhost:8080)</p>';
            }
        }

        function renderGrid(games) {
            gamesGrid.innerHTML = '';
            if (games.length === 0) {
                gamesGrid.innerHTML = '<p style="grid-column: 1/-1; text-align: center;">No games found.</p>';
                return;
            }

            games.forEach(game => {
                const card = document.createElement('div');
                card.className = 'game-card';
                card.onclick = () => {
                    localStorage.setItem('selectedGameId', game.id);
                    window.location.href = 'gameprofile.html';
                };
                
                const hasDiscount = game.discount > 0;

                card.innerHTML = `
                    <img src="${game.imageURL}" alt="${game.name}">
                    <div class="game-info">
                        <h3>${game.name}</h3>
                        <div class="price-details">
                            ${hasDiscount ? `<span class="old-price">€${game.price.toFixed(2)}</span>` : ''}
                            <div class="price-row">
                                ${hasDiscount ? `<span class="discount-tag">-${game.discount}%</span>` : ''}
                                <span class="final-price">€${game.finalPrice.toFixed(2)}</span>
                            </div>
                        </div>
                    </div>
                `;
                gamesGrid.appendChild(card);
            });
        }

        prevBtn.onclick = () => { pageInput.value = parseInt(pageInput.value) - 1; fetchGames(); };
        nextBtn.onclick = () => { pageInput.value = parseInt(pageInput.value) + 1; fetchGames(); };
    </script>
</body>
</html>
