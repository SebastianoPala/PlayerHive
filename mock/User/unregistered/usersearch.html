<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>playerHive | User Search</title>
    <style>
        :root {
            --bg-gradient: radial-gradient(circle at top right, #2a0845, #1a1a24, #0b0c10); 
            --glass-bg: rgba(20, 22, 28, 0.4);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            --accent-glow: #e0f2fe;
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --font-main: 'system-ui', -apple-system, sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: var(--font-main);
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-primary);
            display: flex;
            height: 100vh;
            padding: 20px;
            overflow: hidden;
        }

        .app-wrapper { width: 100%; display: flex; flex-direction: column; gap: 20px; }

        /* HEADER: Search and Controls centered */
        header.glass-nav {
            height: 80px;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            display: grid;
            grid-template-columns: 1fr 3fr 1fr;
            align-items: center;
            padding: 0 40px;
            flex-shrink: 0;
        }

        .logo { font-size: 1.6rem; font-weight: 300; letter-spacing: 2px; display: flex; align-items: center; }
        .logo b { font-weight: 700; }
        .logo::after { content: ""; width: 8px; height: 8px; background: var(--accent-glow); border-radius: 50%; margin-left: 8px; box-shadow: 0 0 10px var(--accent-glow); }

        .search-controls { display: flex; justify-content: center; align-items: center; gap: 10px; }
        .search-input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: var(--text-primary);
            padding: 10px 20px;
            border-radius: 20px;
            outline: none;
            width: 250px;
            transition: 0.3s;
        }
        .search-input:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--accent-glow);
        }
        .control-group { display: flex; align-items: center; gap: 5px; font-size: 0.8rem; color: var(--text-secondary); }
        .num-input {
            width: 60px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 5px;
            border-radius: 8px;
            outline: none;
        }

        .user-actions { display: flex; justify-content: flex-end; }
        .login-btn {
            background: transparent;
            border: 1px solid var(--glass-border);
            color: var(--text-primary);
            padding: 10px 30px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        .login-btn:hover { background: rgba(255, 255, 255, 0.1); }

        /* MAIN: FULL WIDTH (No sidebar) */
        main.glass-content {
            flex: 1;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 30px;
            overflow-y: auto;
        }

        /* MATRIX GRID */
        .users-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 25px;
            width: 100%;
        }

        /* USER CARD ADAPTATION */
        .user-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 25px 15px;
            gap: 15px;
        }
        .user-card:hover { 
            transform: translateY(-5px); 
            background: rgba(255, 255, 255, 0.07); 
            border-color: rgba(255, 255, 255, 0.2);
        }
        
        .user-card img { 
            width: 130px; /* Foto profilo più grande */
            height: 130px; /* Foto profilo più grande */
            border-radius: 50%; 
            object-fit: cover; 
            border: 2px solid var(--glass-border);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        
        .user-info { display: flex; flex-direction: column; align-items: center; gap: 8px; text-align: center; }
        .user-info h3 { font-size: 1.1rem; line-height: 1.2; word-break: break-word; }
        
        /* Tag ruolo meno ingombrante */
        .user-role { 
            font-size: 0.7rem; 
            font-weight: 600;
            color: var(--text-secondary); 
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 2px 8px;
            border-radius: 6px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .pagination-bar { display: flex; justify-content: center; gap: 20px; margin-top: 40px; align-items: center; }
        .nav-btn { background: rgba(255,255,255,0.1); border: none; color: white; padding: 10px 20px; border-radius: 10px; cursor: pointer; transition: 0.2s;}
        .nav-btn:hover:not(:disabled) { background: rgba(255,255,255,0.2); }
        .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>
<body>

    <div class="app-wrapper">
        <header class="glass-nav">
            <div class="logo">player<b>Hive</b></div>
            <div class="search-controls">
                <input type="text" id="searchInput" class="search-input" placeholder="Search users by name...">
                <div class="control-group">
                    <label>Page:</label>
                    <input type="number" id="pageInput" class="num-input" value="0" min="0">
                </div>
                <div class="control-group">
                    <label>Size:</label>
                    <input type="number" id="sizeInput" class="num-input" value="15" min="15">
                </div>
            </div>
            <div class="user-actions">
                <button class="login-btn">Login</button>
            </div>
        </header>

        <main class="glass-content">
            <div id="usersGrid" class="users-grid">
                <p style="grid-column: 1/-1; text-align: center; color: var(--text-secondary); margin-top: 100px;">
                    Enter a username and press Enter to search.
                </p>
            </div>
            
            <div class="pagination-bar" id="paginationControls" style="display: none;">
                <button id="prevBtn" class="nav-btn">Previous Page</button>
                <span id="pageDisplay">Page 0</span>
                <button id="nextBtn" class="nav-btn">Next Page</button>
            </div>
        </main>
    </div>

    <script>
        const usersGrid = document.getElementById('usersGrid');
        const searchInput = document.getElementById('searchInput');
        const pageInput = document.getElementById('pageInput');
        const sizeInput = document.getElementById('sizeInput');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const pageDisplay = document.getElementById('pageDisplay');

        let currentQuery = '';
        let pfpFiles = [];

        // Carica la lista dei file dal file di testo pfps.txt
        async function loadPfpList() {
            try {
                const response = await fetch('../../pfps.txt');
                if (response.ok) {
                    const text = await response.text();
                    // Divide per riga, rimuove gli spazi vuoti e filtra le righe vuote
                    pfpFiles = text.split('\n').map(line => line.trim()).filter(line => line.length > 0);
                }
            } catch (err) {
                console.error("Impossibile caricare pfps.txt. Verrà usato un fallback grafico.", err);
            }
        }

        // Calcola in modo deterministico il percorso locale basandosi sul nome utente
        function getUserPfpPath(username) {
            const basePath = '/home/sebastiano_pala/Pictures/Sfondi/';
            
            if (pfpFiles.length === 0) {
                return 'https://via.placeholder.com/150/1a1a24/e0f2fe?text=U';
            }

            // Semplice algoritmo di hashing per associare sempre la stessa foto allo stesso utente
            let hash = 0;
            for (let i = 0; i < username.length; i++) {
                hash = username.charCodeAt(i) + ((hash << 5) - hash);
            }
            const index = Math.abs(hash) % pfpFiles.length;
            
            return basePath + pfpFiles[index];
        }

        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                currentQuery = searchInput.value.trim();
                if (currentQuery) fetchUsers();
            }
        });

        [pageInput, sizeInput].forEach(input => {
            input.addEventListener('change', () => { if(currentQuery) fetchUsers(); });
        });

        async function fetchUsers() {
            const page = pageInput.value;
            const size = sizeInput.value;
            usersGrid.innerHTML = '<p style="grid-column: 1/-1; text-align: center;">Searching database...</p>';
            
            try {
                const response = await fetch(`http://localhost:8080/api/user/search/${encodeURIComponent(currentQuery)}?page=${page}&size=${size}`);
                const data = await response.json();
                
                renderGrid(data.searchResult);
                
                document.getElementById('paginationControls').style.display = 'flex';
                pageDisplay.innerText = `Page ${page}`;
                prevBtn.disabled = (page <= 0);
                nextBtn.disabled = data.lastPage;
            } catch (err) {
                usersGrid.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: #ff6b6b;">Error: API Offline (localhost:8080)</p>';
            }
        }

        function renderGrid(users) {
            usersGrid.innerHTML = '';
            
            if (!users || users.length === 0) {
                usersGrid.innerHTML = '<p style="grid-column: 1/-1; text-align: center;">No users found.</p>';
                return;
            }

            users.forEach(user => {
                const card = document.createElement('div');
                card.className = 'user-card';
                card.onclick = () => {
                    localStorage.setItem('selectedUserId', user.id);
                    window.location.href = 'userprofile.html';
                };
                
                // Genera il percorso locale /home/sebastiano_pala/...
                const profileImg = getUserPfpPath(user.username);

                card.innerHTML = `
                    <img src="${profileImg}" alt="${user.username}'s avatar" onerror="this.src='https://via.placeholder.com/150/1a1a24/e0f2fe?text=U'">
                    <div class="user-info">
                        <h3>${user.username}</h3>
                    </div>
                `;
                usersGrid.appendChild(card);
            });
        }

        prevBtn.onclick = () => { pageInput.value = parseInt(pageInput.value) - 1; fetchUsers(); };
        nextBtn.onclick = () => { pageInput.value = parseInt(pageInput.value) + 1; fetchUsers(); };

        // Carica la lista di immagini all'avvio della pagina
        loadPfpList();
    </script>
</body>
</html>
