<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>playerHive | Layout Concept 3</title>
    <style>
        /* =========================================
           STYLE VARIABLES - "CONSOLE GLASS" VIBE
           ========================================= */
        :root {
            /* Dynamic background colors to simulate a game cover bleeding through */
            --bg-gradient: radial-gradient(circle at top right, #2a0845, #1a1a24, #0b0c10); 
            
            /* Glassmorphism variables */
            --glass-bg: rgba(20, 22, 28, 0.4);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            
            --accent-glow: #e0f2fe; /* Soft icy white/blue glow */
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --font-main: 'system-ui', -apple-system, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-main);
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-primary);
            display: flex;
            height: 100vh;
            padding: 20px;
            overflow: hidden;
        }

        /* =========================================
           FLOATING APP WRAPPER
           ========================================= */
        .app-wrapper {
            width: 100%;
            max-width: 1800px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* =========================================
           FLOATING GLASS HEADER
           ========================================= */
        header.glass-nav {
            height: 80px;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: var(--glass-shadow);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            flex-shrink: 0;
        }

        .logo {
            font-size: 1.6rem;
            font-weight: 300;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
        }

        .logo b {
            font-weight: 700;
        }

        /* Small dot for the hive theme */
        .logo::after {
            content: "";
            display: inline-block;
            width: 8px;
            height: 8px;
            background-color: var(--accent-glow);
            border-radius: 50%;
            margin-left: 8px;
            box-shadow: 0 0 10px var(--accent-glow);
        }

        .nav-links {
            display: flex;
            gap: 30px;
        }

        .user-actions {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        /* =========================================
           MAIN DASHBOARD AREA
           ========================================= */
        .dashboard-layout {
            display: flex;
            gap: 20px;
            flex: 1;
            height: calc(100vh - 140px); /* Height minus header and padding */
        }

        /* LEFT GLASS PANEL (Content/Library) */
        main.glass-content {
            flex: 3;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: var(--glass-shadow);
            padding: 40px;
            overflow-y: auto;
        }

        /* RIGHT GLASS PANEL (Social/Friends/Activity) */
        aside.glass-sidebar {
            flex: 1;
            max-width: 350px;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: var(--glass-shadow);
            padding: 30px;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        /* Custom Scrollbar for Glass panels */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.4);
        }

    </style>
</head>
<body>

    <div class="app-wrapper">
        
        <!-- TOP NAVIGATION -->
        <header class="glass-nav">
            <div class="logo">player<b>Hive</b></div>
            
            <nav class="nav-links">
                <!-- Add your minimalist nav items here -->
            </nav>

            <div class="user-actions">
                <!-- Add icons, user profile pill, or notifications here -->
            </div>
        </header>

        <!-- DASHBOARD PANELS -->
        <div class="dashboard-layout">
            
            <!-- MAIN CONTENT (Left) -->
            <main class="glass-content">
                <!-- Drop your game covers, hero banners, and grids here -->
            </main>

            <!-- SOCIAL/ACTIVITY SIDEBAR (Right) -->
            <aside class="glass-sidebar">
                <!-- Drop friends list, recent reviews, or chat interface here -->
            </aside>

        </div>

    </div>

</body>
</html>
